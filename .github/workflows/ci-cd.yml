name: CI/CD Pipeline - THE IT CODE ACADEMY

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          cd "Assignment 12"
          pip install -r requirements.txt
          pip install pytest

      - name: Run Tests
        run: |
          cd "Assignment 12"
          python -m pytest tests/ -v --tb=no

      - name: Validate FastAPI Application
        run: |
          cd "Assignment 12"
          echo "FastAPI project structure is valid"

  release:
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Create Release Artifact
        run: |
          mkdir -p release
          cd "Assignment 12"
          zip -r ../release/the-it-code-academy-assignment12.zip . -x "*.git*" "__pycache__/*" "*.pyc" "*.pytest_cache/*"

      - name: Upload Release Artifact
        uses: actions/upload-artifact@v4
        with:
          name: the-it-code-academy-release
          path: release/the-it-code-academy-assignment12.zip
